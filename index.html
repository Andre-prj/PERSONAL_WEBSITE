<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nick — Firmware & Systems</title>
<style>
  :root {
    --bg: #0d0d0d;
    --fg: #e8e8e8;
    --muted: #888;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.6;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 6rem 1.5rem 4rem;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.2rem;
  }
  .role {
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 2.5rem;
  }
  section { margin-bottom: 2.5rem; }
  section h2 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  ul.projects { list-style: none; padding: 0; margin: 0; }
  ul.projects li { margin-bottom: 1rem; }
  ul.projects a {
    color: var(--fg);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
  }
  ul.projects a:hover { color: var(--accent); }
  ul.projects p {
    margin: 0.2rem 0 0;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .links a {
    color: var(--fg);
    text-decoration: none;
    margin-right: 1.2rem;
    border-bottom: 1px solid var(--muted);
  }
  .links a:hover { border-color: var(--accent); color: var(--accent); }
  footer {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 3rem;
  }
</style>
</head>
<body>
<main>
  <h1>Nick [Cognome]</h1>
  <p class="role">Embedded C developer — STM32 / firmware systems</p>

  <section>
    <h2>About</h2>
    <p>
      CLEF unibo student.
      Piano amateur.
      
    </p>
  </section>

  <section>
    <h2>Elsewhere</h2>
    <div class="links">
      <a href="https://github.com/Andrea Carlino" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/Andrea Carlino" target="_blank">LinkedIn</a>
      <a href="mailto:you@example.com">Email</a>
    </div>
  </section>

  <footer>&copy; 2026 Andrea Carlino</footer>
</main>
</body>
</html>
